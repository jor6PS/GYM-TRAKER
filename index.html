
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Intelligent AI Workout Tracker" />
    
    <!-- PWA Installation Requirements -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/pwa-192x192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/pwa-512x512.png">
    <link rel="manifest" href="/manifest.webmanifest" crossorigin="use-credentials">
    
    <!-- iOS Safari PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gym.AI">
    
    <!-- Android Chrome PWA Support -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="GymTracker AI">
    
    <!-- Windows Tiles -->
    <meta name="msapplication-TileColor" content="#000000">
    <meta name="msapplication-TileImage" content="/pwa-192x192.png">
    <meta name="msapplication-config" content="/browserconfig.xml">
    
    <!-- Additional PWA Meta Tags -->
    <meta name="format-detection" content="telephone=no">
    <meta name="HandheldFriendly" content="true">
    
    <title>GymTracker AI</title>
    
    <!-- Emergency Polyfill for libraries expecting Node.js environment -->
    <script>
      window.process = {
        env: {
          NODE_ENV: 'production'
        }
      };
    </script>

    <!-- Import Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    
    <!-- Theme Script -->
    <script>
      if (localStorage.theme === 'dark' || (!('theme' in localStorage))) {
        document.documentElement.classList.add('dark')
      } else {
        document.documentElement.classList.remove('dark')
      }
    </script>
    
    <!-- Desregistrar Service Worker en desarrollo para evitar conflictos con HMR -->
    <script>
      // Solo en desarrollo (localhost)
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) {
              registration.unregister().then(function(success) {
                if (success) {
                  console.log('✅ Service Worker desregistrado en desarrollo');
                }
              });
            }
          });
        }
      }
    </script>
</head>
  <body class="antialiased selection:bg-primary selection:text-black">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
